<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MoodStudy x MemeLogic</title>
  <!-- 引入組員的 CSS -->
  <link rel="stylesheet" href="./static/css/teammate_style.css" />
  <!-- 引入我們原本的 CSS (可能會有一些衝突，後續會處理) -->
  <link rel="stylesheet" href="./static/css/style.css">
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>
</head>
<body>
  <!-- 這是組員的 UI 容器 -->
  <div id="app"></div>

  <!-- 自製的聊天機器人已移除，改由 Botpress 接管 -->

  <!-- 日誌輸入 Modal -->
  <div id="journal-modal" class="modal-overlay" style="z-index: 9999;">
      <div class="modal-content" style="max-width: 450px;">
          <h2 style="margin-bottom: 10px;">✍️ 撰寫今日日誌</h2>
          <p style="margin-bottom: 15px; color: #666;">總結一下今天的學習狀態，這段話將會被印在您的專屬明信片上！</p>
          
          <textarea id="journal-input" placeholder="今天雖然很累，但我還是撐過來了！..." style="width: 100%; height: 100px; padding: 10px; border-radius: 8px; border: 1px solid #ccc; font-family: inherit; font-size: 1em; resize: none; box-sizing: border-box;"></textarea>

          <div style="display: flex; gap: 10px; margin-top: 20px;">
              <button id="btn-confirm-journal" class="btn-squish" style="flex: 1; background-color: var(--color-stable); color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 1em;">確定生成</button>
              <button id="btn-cancel-journal" class="btn-squish" style="flex: 1; background-color: #eee; color: #333; border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 1em;">取消</button>
          </div>
      </div>
  </div>

  <!-- 圖鑑放大檢視 Modal -->
  <div id="gallery-lightbox" class="modal-overlay" style="display: none; align-items: center; justify-content: center; z-index: 9999;">
      <div style="position: relative;">
          <button id="btn-close-lightbox" style="position: absolute; top: -15px; right: -15px; background: #d9534f; color: white; border: none; border-radius: 50%; width: 30px; height: 30px; font-weight: bold; cursor: pointer; z-index: 2010; box-shadow: 0 2px 5px rgba(0,0,0,0.2);">X</button>
          <div id="lightbox-content">
              <!-- 這裡將動態插入放大的明信片 HTML 或圖片 -->
          </div>
      </div>
  </div>

  <!-- Add Todo Modal -->
  <div id="add-todo-modal" class="modal-overlay" style="display: none; z-index: 9999;">
      <div class="modal-content" style="max-width: 450px;">
          <h2 style="margin-bottom: 10px;">✨ 新增任務與 AI 拆解</h2>
          <p style="margin-bottom: 15px; color: #666;">設定您的目標，讓 AI 幫您拆解成無痛的微型任務吧！</p>
          
          <div style="margin-bottom: 15px; text-align: left;">
              <label style="display: block; font-weight: bold; margin-bottom: 5px;">🎯 任務名稱</label>
              <input type="text" id="todo-input-text" placeholder="例如：期末考複習、每天跑步5公里..." style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ccc; font-size: 1em; box-sizing: border-box;">
          </div>

          <div style="margin-bottom: 15px; text-align: left;">
              <label style="display: block; font-weight: bold; margin-bottom: 5px;">⏳ 預估時間</label>
              <input type="text" id="todo-input-time" placeholder="例如：30 分鐘" value="30 分鐘" style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ccc; font-size: 1em; box-sizing: border-box;">
          </div>

          <div style="margin-bottom: 15px; text-align: left;">
              <label style="display: block; font-weight: bold; margin-bottom: 5px;">📅 目標期程 (AI 將據此調整拆解策略)</label>
              <select id="todo-input-term" style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ccc; font-size: 1em; box-sizing: border-box;">
                  <option value="短期">短期目標 (1天~1週內完成)</option>
                  <option value="中期">中期目標 (1週~1個月完成)</option>
                  <option value="長期">長期目標 (持續培養的習慣或長遠計畫)</option>
              </select>
          </div>

          <div style="margin-bottom: 15px; text-align: left; display: flex; align-items: center; gap: 8px;">
              <input type="checkbox" id="todo-input-ai" checked style="width: 18px; height: 18px; cursor: pointer;">
              <label for="todo-input-ai" style="font-weight: bold; cursor: pointer; color: var(--color-primary);">✨ 使用 AI 自動拆解成微型任務</label>
          </div>

          <div style="display: flex; gap: 10px; margin-top: 20px;">
              <button id="btn-confirm-todo" class="btn-squish" style="flex: 1; background-color: var(--color-stable); color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 1em;">確定新增</button>
              <button id="btn-cancel-todo" class="btn-squish" style="flex: 1; background-color: #eee; color: #333; border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 1em;">取消</button>
          </div>
      </div>
  </div>

  <!-- 引入所有的 JS -->
<script src="./static/js/botpress_loader.js?v=20"></script>
<script src="./static/js/teammate_script.js?v=20"></script>
<script src="./static/js/popcat.js?v=20"></script>
<script src="./static/js/gacha.js?v=20"></script>
<script src="./static/js/postcard.js?v=20"></script>

  <!-- Botpress Scripts are now loaded dynamically in teammate_script.js -->
</body>
</html>
